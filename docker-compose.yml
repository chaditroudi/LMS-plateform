version: "3.8"

services:
  # API Gateway
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - course-service
      - user-service
      - ai-tutor-service
    networks:
      - lms-network
    restart: unless-stopped

  # Learning Portal - Next.js + shadcn/ui
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://nginx
      - NEXT_PUBLIC_COURSE_SERVICE_URL=http://course-service:8001
      - NEXT_PUBLIC_USER_SERVICE_URL=http://user-service:8002
      - NEXT_PUBLIC_AI_TUTOR_URL=http://ai-tutor-service:8004
    depends_on:
      - course-service
      - user-service
    networks:
      - lms-network
    restart: unless-stopped

  # Course Service - FastAPI
  course-service:
    build:
      context: ./services/course-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://lms_user:lms_password@postgres:5432/lms_courses
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms-network
    restart: unless-stopped

  # User Service - Node.js/Express
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/lms_users
      - JWT_SECRET=your-secret-key-change-in-production
      - REDIS_URL=redis://redis:6379/1
      - PORT=8002
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms-network
    restart: unless-stopped

  # AI Tutor Service - FastAPI + LLM
  ai-tutor-service:
    build:
      context: ./services/ai-tutor-service
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://lms_user:lms_password@postgres:5432/lms_courses
      - REDIS_URL=redis://redis:6379/2
      - LLM_MODEL=llama2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=lms_user
      - POSTGRES_PASSWORD=lms_password
      - POSTGRES_DB=lms_courses
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_courses"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network
    restart: unless-stopped

  # MongoDB Database
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./db/init/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network
    restart: unless-stopped

  # n8n Automation - Feedback Workflow
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=lms_courses
      - DB_POSTGRESDB_USER=lms_user
      - DB_POSTGRESDB_PASSWORD=lms_password
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lms-network
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  n8n_data:

networks:
  lms-network:
    driver: bridge
